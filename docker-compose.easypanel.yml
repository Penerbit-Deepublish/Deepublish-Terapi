services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terapi-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/terapi?schema=terapi
      JWT_SECRET: change-this-to-a-long-random-secret
      JWT_EXPIRES_IN: 12h
      ADMIN_EMAIL: admin@terapi.local
      ADMIN_PASSWORD: change-this-password
      SEED_ON_BOOT: "false"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: terapi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: terapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - terapi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d terapi"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  terapi_postgres_data:
